name: Build OpenWrt for RK322x (armvirt/32)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: ⚙️ Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y wget xz-utils

      - name: 📥 Download OpenWrt ImageBuilder 22.03.7
        run: |
          wget https://downloads.openwrt.org/releases/22.03.7/targets/armvirt/32/openwrt-imagebuilder-22.03.7-armvirt-32.Linux-x86_64.tar.xz
          tar -xf openwrt-imagebuilder-*.tar.xz
          echo "IB_DIR=$(pwd)/openwrt-imagebuilder-22.03.7-armvirt-32.Linux-x86_64" >> $GITHUB_ENV

      - name: 🔨 Build Minimal Image (Profile: Default)
        run: |
          cd ${{ env.IB_DIR }}
          
          # Build dengan package minimal yang pasti kompatibel
          make image \
            PROFILE=Default \
            PACKAGES="luci luci-base luci-mod-network luci-mod-system luci-theme-bootstrap \
                      kmod-usb-core kmod-usb2 kmod-usb3 kmod-usb-storage block-mount \
                      tcpdump nmap htop vim openssh-sftp-server" \
            BIN_DIR="${{ github.workspace }}/output" \
            2>&1 | tee build.log
          
          # Verifikasi hasil
          if [ ! -f ${{ github.workspace }}/output/openwrt-*-armvirt-32-*.img.gz ]; then
            echo "❌ Build failed - last 30 lines of log:"
            tail -30 build.log
            exit 1
          fi
          echo "✅ Build successful!"
          ls -lh ${{ github.workspace }}/output/

      - name: 📦 Prepare Artifacts
        run: |
          mkdir -p artifacts
          cp ${{ github.workspace }}/output/openwrt-*-armvirt-32-*.img.gz artifacts/firmware.img.gz
          
          # Buat README sederhana
          cat > artifacts/README.txt << 'EOF'
          # OpenWrt 22.03.7 for RK322x (armvirt/32)

          ⚠️ RK322x is NOT officially supported by OpenWrt.
          This is an experimental adaptation using generic armvirt target.

          ✅ Ethernet usually works
          ⚠️ Internal WiFi (SSV6051/ESP8089) NOT supported → use USB WiFi adapter
          ✅ USB storage & 4G modems usually work

          ## Flashing Instructions
          1. Decompress: gunzip firmware.img.gz
          2. Enter maskrom mode on RK322x (press reset button + plug USB A-to-A)
          3. Flash:
             sudo rkdeveloptool db rk322x_loader_v1.10.256.bin
             sudo rkdeveloptool wl 0x0 firmware.img
             sudo rkdeveloptool rd

          ## Default Login
          - IP: 192.168.1.1
          - User: root
          - Password: (empty)
          EOF

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-rk322x-22.03.7
          path: artifacts/
          retention-days: 7
