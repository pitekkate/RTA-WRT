name: RTA-WRT for RK322x (armvirt/32)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: ⚙️ Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget curl build-essential \
            libncurses5-dev zlib1g-dev gawk ccache unzip libssl-dev \
            xsltproc rsync python3 python3-distutils python3-setuptools \
            swig libelf-dev asciidoc binutils bzip2 gettext autoconf \
            automake libtool bison flex jq xz-utils coreutils

      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 📥 Download OpenWrt ImageBuilder
        id: download_ib
        run: |
          IB_URL="https://downloads.openwrt.org/releases/22.03.7/targets/armvirt/32/openwrt-imagebuilder-22.03.7-armvirt-32.Linux-x86_64.tar.xz"
          wget -q --show-progress "$IB_URL" -O /tmp/imagebuilder.tar.xz
          
          # Verifikasi ukuran
          SIZE=$(stat -c%s /tmp/imagebuilder.tar.xz)
          if [ $SIZE -lt 50000000 ]; then
            echo "❌ Download gagal (file terlalu kecil: ${SIZE} bytes)"
            exit 1
          fi
          
          tar -xf /tmp/imagebuilder.tar.xz -C /tmp/
          IB_DIR="/tmp/openwrt-imagebuilder-22.03.7-armvirt-32.Linux-x86_64"
          echo "IB_DIR=$IB_DIR" >> $GITHUB_ENV
          echo "IB_DIR=$IB_DIR"

      - name: 🧩 Apply RTA-WRT Customization
        run: |
          mkdir -p "${{ env.IB_DIR }}/packages"
          cp -r packages/* "${{ env.IB_DIR }}/packages/" 2>/dev/null || true
          
          mkdir -p "${{ env.IB_DIR }}/files"
          cp -r files/* "${{ env.IB_DIR }}/files/" 2>/dev/null || true
          
          # Hapus package bermasalah
          sed -i '/luci-theme-argon/d' "${{ env.IB_DIR }}/feeds.conf.default"
          sed -i '/luci-app-argon-config/d' "${{ env.IB_DIR }}/feeds.conf.default"

      - name: 🔨 Build Image
        run: |
          cd "${{ env.IB_DIR }}"
          
          PACKAGES="base-files firewall dnsmasq dropbear opkg uci uhttpd luci luci-basei-mod-status luci-mod-network luci-mod-system kmod-usb-core kmod-usb-storage kmod-usb2 kmod-usb3 tcpdump nmap htop vim openssh-sftp-server curl wget kmod-ipt-offload"
          
          make image \
            PROFILE=Default \
            PACKAGES="$PACKAGES" \
            FILES="files/" \
            BIN_DIR="/tmp/output" \
            2>&1 | tee /tmp/build.log
          
          if [ ! -f /tmp/output/openwrt-*-armvirt-32-*.img.gz ]; then
            echo "❌ Build gagal"
            tail -20 /tmp/build.log
            exit 1
          fi

      - name: 📦 Prepare Artifacts
        run: |
          mkdir -p /tmp/artifacts
          cp /tmp/output/openwrt-*-armvirt-32-*.img.gz /tmp/artifacts/firmware.img.gz
          
          cat > /tmp/artifacts/README.txt << 'EOF'
# RTA-WRT322x (armvirt/32)
Built on: $(date)

⚠️ RK322x is NOT officially supported.
✅ Ethernet usually works
⚠️ Internal WiFi NOT supported — use USB WiFi adapter
EOF

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rta-wrt-rk322x-22.03.7
          path: /tmp/artifacts/
          retention-days: 30
